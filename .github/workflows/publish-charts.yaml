name: Publish charts

on:
  workflow_call:
    inputs:
      ref:
        type: string
        description: The ref to build.
        required: true
    outputs:
      chart-version:
        description: The chart version that was published
        value: ${{ jobs.publish_charts.outputs.chart-version }}

jobs:
  publish_charts:
    name: Publish Helm charts to GitHub pages
    runs-on: ubuntu-latest
    outputs:
      chart-version: ${{ steps.semver.outputs.version }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}
          # This is important for the semver action to work correctly
          # when determining the number of commits since the last tag
          fetch-depth: 0

      - name: Get SemVer version for current commit
        id: semver
        uses: azimuth-cloud/github-actions/semver@718c40d2def4fd8acd4bc5fb348bc8a5e6361b31 # master 2026-06-15

      - name: Publish Helm charts
        uses: azimuth-cloud/github-actions/helm-publish@718c40d2def4fd8acd4bc5fb348bc8a5e6361b31 # master 2026-06-15
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: ${{ steps.semver.outputs.version }}
          app-version: ${{ steps.semver.outputs.short-sha }}
