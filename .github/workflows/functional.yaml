name: Functional tests

on:
  workflow_call:
    inputs:
      ref:
        type: string
        description: The ref to build.
        required: true

jobs:
  functional_test:
    name: Operator functional tests via tox
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Create k8s Kind Cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0

      - name: Get SemVer version for current commit
        id: semver
        uses: azimuth-cloud/github-actions/semver@718c40d2def4fd8acd4bc5fb348bc8a5e6361b31 # master 2026-06-15

      - name: Run test
        timeout-minutes: 10
        run: tools/functional_test.sh
        env:
          IMAGE_TAG: ${{ steps.semver.outputs.short-sha }}
