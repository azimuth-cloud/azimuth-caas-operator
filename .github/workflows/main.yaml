name: on push to main

on:
  push:
    branches:
      - main

concurrency:
  group: main
  cancel-in-progress: true

jobs:
  unit_tests:
    uses: ./.github/workflows/tox.yaml
    with:
      ref: ${{ github.ref }}

  publish_images:
    uses: ./.github/workflows/publish-images.yaml
    with:
      ref: ${{ github.ref }}
    secrets: inherit
    permissions:
      contents: read
      id-token: write
      packages: write
      security-events: write

  publish_charts:
    needs: [publish_images]
    uses: ./.github/workflows/publish-charts.yaml
    with:
      ref: ${{ github.ref }}
    secrets: inherit
    permissions:
      contents: write
      pull-requests: write

  functional_tests:
    needs: [publish_images]
    uses: ./.github/workflows/functional.yaml
    with:
      ref: ${{ github.ref }}
    secrets: inherit
